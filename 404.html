<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada · Clínica Sorriso Pleno</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7fb">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1118">
  <!--
    Este arquivo entra em cena sempre que alguém acessa um caminho que não
    existe (ex.: um link ou URL digitada errada, tipo /sobr.html). Este site
    tem múltiplas páginas reais — diferente de uma SPA de página única, aqui
    isso é um caso genuíno e frequente, não só uma curiosidade teórica do
    GitHub Pages — por isso o link de volta abaixo é tratado como parte da
    experiência, não só um detalhe cosmético.
  -->
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f6f7fb;
      color: #171923;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e1118; color: #e8eaf2; }
      a { color: #a5b4fc; }
    }
    a { color: #4338ca; }
    .caixa { max-width: 30rem; }
    h1 { font-size: 1.6rem; margin: 0 0 0.6rem; }
    .botao-inicio {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1.3rem;
      border-radius: 999px;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .aviso-redirecionamento {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="caixa">
    <h1>Página não encontrada</h1>
    <p>O caminho <code id="caminho"></code> não existe neste site.</p>
    <p><a id="link-inicio" class="botao-inicio" href="./">Voltar ao início</a></p>
    <p class="aviso-redirecionamento">Redirecionando automaticamente em instantes…</p>
  </div>
  <script>
    // Caminhos internos da aplicação começam com o fragmento "#" e nunca
    // chegam até aqui — este script só trata caminhos realmente inexistentes.
    // Detecção pelo CAMINHO (não pelo hostname): funciona igual em
    // localhost, no project page e no domínio próprio, sem edição.
    (function () {
      var repositorio = "simple_single_page_app";
      var segmentos = location.pathname.split("/").filter(Boolean);
      var naRaizDoProjeto = segmentos[0] === repositorio;
      var destino = naRaizDoProjeto ? "/" + repositorio + "/" : "/";
      document.getElementById("caminho").textContent = location.pathname;
      document.getElementById("link-inicio").setAttribute("href", destino);
      setTimeout(function () {
        location.replace(destino);
      }, 1200);
    })();
  </script>
</body>
</html>
