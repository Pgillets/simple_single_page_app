name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-html:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes html-validate "**/*.html" --ignore "node_modules"

  check-links:
    name: Verificar links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200..=204,429
            --exclude "https://api\.github\.com.*"
            "**/*.html" "**/*.md"
          fail: true
